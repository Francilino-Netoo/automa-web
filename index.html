<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela de Login</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="manifest" href="/manifest.json" />
  </head>

  <body>
    <div class="login-container">
      <img src="./src/image/IA.png" alt="Logo" />
      <form id="login-form">
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input
            type="email"
            name="email"
            placeholder="Email"
            required
            pattern="^[\w\.\-]+@[\w\.\-]+\.\w{2,}$"
            title="Por favor, insira um endereço de email válido no formato exemplo@dominio.com"
          />
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" placeholder="Senha" required />
        </div>
        <button type="submit">LOGIN</button>
      </form>
      <p>
        Não tem uma conta?
        <a href="./src/screens/cadastro/index.html">Cadastre-se</a>
      </p>
      <p>
        Esqueceu a senha?
        <a href="./src/screens/recuperar/index.html">Recuperar senha</a>
      </p>
    </div>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/service-worker.js")
          .then(function (registration) {
            console.log("Service Worker registrado com sucesso:", registration);
          })
          .catch(function (error) {
            console.log("Falha ao registrar o Service Worker:", error);
          });
      }

      async function verifyToken(token) {
        try {
          const response = await fetch(
            "https://automa-cassinos.dev.br/refresh_bac",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ token }),
            }
          );
          //
          if (response.ok) {
            const data = await response.json();
            if (data.message === "true") {
              window.location.href = "./src/screens/manual/index.html";
            } else {
              localStorage.removeItem("authToken");
              window.location.href = "./index.html";
            }
          } else {
            console.error(
              "Failed to verify token. Response:",
              await response.text()
            );
            localStorage.removeItem("authToken");
            window.location.href = "./index.html";
          }
        } catch (error) {
          console.error("Error verifying token:", error);
          localStorage.removeItem("authToken");
          window.location.href = "./index.html";
        }
      }

      window.onload = async function () {
        const token = localStorage.getItem("authToken");
        if (token) {
          await verifyToken(token);
        }
      };

      document
        .getElementById("login-form")
        .addEventListener("submit", async (event) => {
          event.preventDefault();

          const email = document.querySelector('input[name="email"]').value;
          const password = document.querySelector(
            'input[name="password"]'
          ).value;

          try {
            const response = await fetch(
              "https://automa-cassinos.dev.br/login_bac",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ email, password }),
              }
            );

            const data = await response.json();
            if (response.ok) {
              localStorage.setItem("authToken", data.token);
              window.location.href = "./src/screens/manual/index.html";
            } else {
              alert(data.message || "Erro ao fazer login.");
            }
          } catch (error) {
            alert("Erro ao fazer login.");
            console.error("Login error:", error);
          }
        });
    </script>
  </body>
</html>
