<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela de Login</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      /* CSS para ocultar elementos */
      .hide {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="caixa-principal" id="home">
      <nav>
        <ul>
          <li><a class="link-menu" href="../../manual/index.html">HOME</a></li>
          <li><a class="link-menu" href="#sobre">TUTORIAL</a></li>
          <li>
            <a class="link-menu" href="../../manual/index.html">CONTATO</a>
          </li>
          <li><a class="link-menu" href="#fale-comigo">DESLOGAR</a></li>
        </ul>
      </nav>
      <div class="imagens-container-wrapper">
        <div class="imagens-container" id="content-area">
          <div class="manual-container">
            <img
              id="project-image"
              src="../../../image/telinhas/ro.png"
              alt="Projeto Role"
            />

            <div class="video-container hide" id="video-container"></div>
            <div class="button-container">
              <button class="btn ligar">Ligar IA</button>
              <button class="btn desligar">IA Desligada</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const token =
          localStorage.getItem("authToken") || "Token não encontrado";

        const ligarButton = document.querySelector(".ligar");
        const desligarButton = document.querySelector(".desligar");
        const videoContainer = document.getElementById("video-container");
        const projectImage = document.getElementById("project-image");

        if (!token) {
          console.log("Nenhum token encontrado no localStorage.");
          window.location.href = "../../login/index.html";
          return;
        }

        const loadVideo = async () => {
          if (token) {
            try {
              const response = await fetch(
                `https://automa-cassinos.dev.br/roleta?token=${encodeURIComponent(
                  token
                )}`,
                {
                  method: "GET",
                }
              );

              const data = await response.json();

              if (data.videoUrl) {
                videoContainer.innerHTML = `
                <iframe
                  src="${data.videoUrl}"
                  frameborder="0"
                  allowfullscreen
                ></iframe>
              `;
                updateButtonStates("IA Ligada", "Desligar IA");
                videoContainer.classList.remove("hide");
                projectImage.classList.add("hide");

                adjustIframeSize();
              } else {
                alert("Erro ao obter o link de vídeo.");
              }
            } catch (error) {
              console.error("Erro ao fazer a solicitação:", error);
            }
          } else {
            alert("Token não encontrado. Por favor, faça o login novamente.");
          }
        };

        const updateButtonStates = (ligarText, desligarText) => {
          const buttonContainer = document.querySelector(".button-container");
          buttonContainer.innerHTML = `
          <button class="btn ligar">${ligarText}</button>
          <button class="btn desligar">${desligarText}</button>
        `;
          attachButtonEvents();
        };

        const attachButtonEvents = () => {
          document.querySelector(".ligar").addEventListener("click", loadVideo);
          document.querySelector(".desligar").addEventListener("click", () => {
            updateButtonStates("Ligar IA", "IA Desligada");
            videoContainer.classList.add("hide");
            projectImage.classList.remove("hide");
          });
        };

        const adjustIframeSize = () => {
          const screenWidth = window.innerWidth;
          const screenHeight = window.innerHeight;

          const videoIframe = document.querySelector(".video-container iframe");
          if (videoIframe) {
            videoIframe.style.width = `${screenWidth}px`;
            videoIframe.style.height = `${screenHeight}px`;
          }
        };

        window.addEventListener("resize", adjustIframeSize);
        attachButtonEvents();
      });
    </script>
  </body>
</html>
