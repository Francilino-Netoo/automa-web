<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bac Bo</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <link
      href="https://unpkg.com/boxicons@latest/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body>
    <header class="header">
      <a href="#" class="logo">Automa<span>Web</span></a>
      <i class="bx bx-menu" id="menu-icon"></i>
      <nav class="navbar">
        <a href="../../../#home" class="active">Início</a>
        <a href="../../../#portfolio">IAs</a>
        <a href="../../../#contact">Contato</a>
        <ul id="desaparecer">
          <li>
            <button class="btn ligar">Ligar IA</button>
            <button class="btn desligar">Desligar IA</button>
          </li>
        </ul>
        <ul id="desaparecer1">
          <li>
            <button class="btn ligar">Ligar IA</button>
            <button class="btn desligar">Desligar IA</button>
          </li>
        </ul>
      </nav>
    </header>

    <div class="imagens-container" id="content-area">
      <div class="manual-container">
        <div class="ajustar" id="draggable-resizable">
          <div id="api-message1">
            <!-- Mensagens serão adicionadas aqui -->
          </div>
          <div id="api-message2">
            <!-- Mensagens serão adicionadas aqui -->
          </div>
          <div id="api-message3">
            <!-- Mensagens serão adicionadas aqui -->
          </div>
          <div id="api-message4">
            <!-- Mensagens serão adicionadas aqui -->
          </div>
          <div id="api-message5">
            <!-- Mensagens serão adicionadas aqui -->
          </div>
        </div>

        <img
          id="project-image"
          src="../../../images/telinhas/ro.png"
          alt="IA Bac Bo"
        />
      </div>
      <div class="video-container hide" id="video-container"></div>
    </div>

    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="../js/script.js"></script>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const token =
          localStorage.getItem("authToken") || "Token não encontrado";
        const videoContainer = document.getElementById("video-container");
        const projectImage = document.getElementById("project-image");
        const apiMessage1Div = document.getElementById("api-message1");
        const apiMessage2Div = document.getElementById("api-message2");
        const apiMessage3Div = document.getElementById("api-message3");
        const apiMessage4Div = document.getElementById("api-message4");
        const apiMessage5Div = document.getElementById("api-message5");

        const loadingIndicator = document.createElement("div");
        loadingIndicator.textContent = "Carregando vídeo...";
        loadingIndicator.classList.add("loading-indicator");

        const socket = io("http://192.168.41.77:5006");

        // Listeners para cada tipo de mensagem da API
        socket.on("api_message", (data) => {
          console.log("Dados recebidos do WebSocket (api_message):", data);
          if (data && typeof data === "object" && data.possivel_sinal) {
            const message = data.possivel_sinal;
            apiMessage1Div.innerHTML = `<p>${message}</p>`;
          } else {
            apiMessage1Div.innerHTML = `<p>Dados inválidos recebidos (api_message)</p>`;
          }
        });

        socket.on("api_message1", (data) => {
          console.log("Dados recebidos do WebSocket (api_message1):", data);
          if (data && typeof data === "object" && data.possivel_sinal) {
            const message = data.possivel_sinal;
            apiMessage2Div.innerHTML = `<p>${message}</p>`;
          } else {
            apiMessage2Div.innerHTML = `<p>Dados inválidos recebidos (api_message1)</p>`;
          }
        });

        socket.on("api_message2", (data) => {
          console.log("Dados recebidos do WebSocket (api_message2):", data);
          if (data && typeof data === "object" && data.possivel_sinal) {
            const message = data.possivel_sinal;
            apiMessage3Div.innerHTML = `<p>${message}</p>`;
          } else {
            apiMessage3Div.innerHTML = `<p>Dados inválidos recebidos (api_message2)</p>`;
          }
        });

        socket.on("api_message3", (data) => {
          console.log("Dados recebidos do WebSocket (api_message3):", data);
          if (data && typeof data === "object" && data.possivel_sinal) {
            const message = data.possivel_sinal;
            apiMessage4Div.innerHTML = `<p>${message}</p>`;
          } else {
            apiMessage4Div.innerHTML = `<p>Dados inválidos recebidos (api_message3)</p>`;
          }
        });

        socket.on("api_message4", (data) => {
          console.log("Dados recebidos do WebSocket (api_message4):", data);
          if (data && typeof data === "object" && data.possivel_sinal) {
            const message = data.possivel_sinal;
            apiMessage5Div.innerHTML = `<p>${message}</p>`;
          } else {
            apiMessage5Div.innerHTML = `<p>Dados inválidos recebidos (api_message4)</p>`;
          }
        });

        if (token === "Token não encontrado") {
          console.log("Nenhum token encontrado no localStorage.");
          window.location.href = "../../../../index.html";
          return;
        }

        const loadVideo = async () => {
          if (token) {
            try {
              videoContainer.appendChild(loadingIndicator); // Mostrar indicador de carregamento
              const response = await fetch(
                `https://automa-cassinos.dev.br/roleta?token=${encodeURIComponent(
                  token
                )}`,
                { method: "GET" }
              );
              const data = await response.json();
              videoContainer.removeChild(loadingIndicator); // Esconder indicador de carregamento

              if (data.videoUrl) {
                videoContainer.innerHTML = `<iframe src="${data.videoUrl}" frameborder="0"></iframe>`;
                videoContainer.classList.remove("hide");
                projectImage.classList.add("hide");
                updateButtonStates("IA Ligada", "Desligar IA");
              } else {
                alert("Erro ao obter o link de vídeo.");
              }
            } catch (error) {
              console.error("Erro ao fazer a solicitação:", error);
              videoContainer.removeChild(loadingIndicator); // Esconder indicador de carregamento
              alert("Erro na conexão. Por favor, tente novamente.");
            }
          } else {
            alert("Token não encontrado. Por favor, faça o login novamente.");
          }
        };

        const closeVideo = () => {
          videoContainer.innerHTML = "";
          videoContainer.classList.add("hide");
          projectImage.classList.remove("hide");
          updateButtonStates("Ligar IA", "IA Desligada");
        };

        const updateButtonStates = (ligarText, desligarText) => {
          document.querySelectorAll(".btn.ligar").forEach((button) => {
            button.textContent = ligarText;
          });
          document.querySelectorAll(".btn.desligar").forEach((button) => {
            button.textContent = desligarText;
          });
        };

        const attachButtonEvents = () => {
          document.querySelectorAll(".btn.ligar").forEach((button) => {
            button.addEventListener("click", loadVideo);
          });

          document.querySelectorAll(".btn.desligar").forEach((button) => {
            button.addEventListener("click", closeVideo);
          });
        };

        attachButtonEvents();

        // Seleciona os elementos
        const draggableResizable = document.getElementById(
          "draggable-resizable"
        );
        const resizeHandle = draggableResizable.querySelector(".resize-handle");

        // Variáveis para arrastar
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // Função para iniciar o arrasto
        const startDrag = (e) => {
          if (e.target === resizeHandle) return; // Evita iniciar o arrasto ao clicar na alça de redimensionamento
          isDragging = true;
          dragOffsetX = e.clientX - draggableResizable.offsetLeft;
          dragOffsetY = e.clientY - draggableResizable.offsetTop;
          document.body.style.userSelect = "none"; // Previne seleção de texto durante o arrasto
        };

        // Função para mover a caixa
        const onDrag = (e) => {
          if (isDragging) {
            draggableResizable.style.left = `${e.clientX - dragOffsetX}px`;
            draggableResizable.style.top = `${e.clientY - dragOffsetY}px`;
          }
        };

        // Função para parar o arrasto
        const stopDrag = () => {
          isDragging = false;
          document.body.style.userSelect = "auto";
        };

        // Adiciona os event listeners para arrastar
        draggableResizable.addEventListener("mousedown", startDrag);
        document.addEventListener("mousemove", onDrag);
        document.addEventListener("mouseup", stopDrag);
      });
    </script>
  </body>
</html>
