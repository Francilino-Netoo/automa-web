<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela de Login</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      /* CSS para ocultar elementos */
      .hide {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="caixa-principal" id="home">
      <!-- Menu Lateral -->
      <div class="side-menu hidden" id="side-menu">
        <a href="../../manual/index.html">HOME</a>
        <a href="#sobre">TUTORIAL</a>
        <a href="#clinica">DESLOGAR</a>
        <a href="../../manual/index.html">CONTATO</a>
        <div class="button-container">
          <button class="btn ligar">Ligar IA</button>
          <button class="btn desligar">IA Desligada</button>
        </div>
      </div>
      <span class="openbtn" onclick="toggleMenu()">☰</span>
      <nav>
        <ul>
          <li><a class="link-menu" href="../../manual/index.html">HOME</a></li>
          <li><a class="link-menu" href="#sobre">TUTORIAL</a></li>

          <li>
            <a class="link-menu" href="../../manual/index.html">CONTATO</a>
          </li>

          <li><a class="link-menu" href="#fale-comigo">DESLOGAR</a></li>
        </ul>
      </nav>
      <div class="imagens-container-wrapper">
        <div class="imagens-container" id="content-area">
          <div class="manual-container">
            <img
              id="project-image"
              src="../../../image/telinhas/fut.png"
              alt="Projeto Fut"
            />

            <div class="video-container hide" id="video-container">
              <!-- O iframe será inserido dinamicamente aqui -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const token =
          localStorage.getItem("authToken") || "Token não encontrado";
        const ligarButton = document.querySelector(".ligar");
        const desligarButton = document.querySelector(".desligar");
        const videoContainer = document.getElementById("video-container");
        const projectImage = document.getElementById("project-image");

        if (!token) {
          console.log("Nenhum token encontrado no localStorage.");
          window.location.href = "../../../../index.html";
          return;
        }

        const loadVideo = async () => {
          closeMenu(); // Fechar o menu ao clicar em "Ligar IA"
          if (token) {
            try {
              const response = await fetch(
                `https://automa-cassinos.dev.br/futtboll?token=${encodeURIComponent(
                  token
                )}`,
                { method: "GET" }
              );
              const data = await response.json();
              if (data.videoUrl) {
                videoContainer.innerHTML = `<iframe src="${data.videoUrl}" frameborder="0" allowfullscreen></iframe>`;
                videoContainer.classList.remove("hidden");
                videoContainer.classList.add("visible");
                projectImage.classList.add("hidden");
              } else {
                alert("Erro ao obter o link de vídeo.");
              }
            } catch (error) {
              console.error("Erro ao fazer a solicitação:", error);
            }
          } else {
            alert("Token não encontrado. Por favor, faça o login novamente.");
          }
        };

        const updateButtonStates = (ligarText, desligarText) => {
          const buttonContainer = document.querySelector(".button-container");
          buttonContainer.innerHTML = `
            <button class="btn ligar">${ligarText}</button>
            <button class="btn desligar">${desligarText}</button>
          `;
          attachButtonEvents();
        };

        const attachButtonEvents = () => {
          document.querySelector(".ligar").addEventListener("click", loadVideo);
          document.querySelector(".desligar").addEventListener("click", () => {
            closeMenu(); // Fechar o menu ao clicar em "Desligar IA"
            updateButtonStates("Ligar IA", "IA Desligada");
            videoContainer.classList.add("hidden");
            videoContainer.classList.remove("visible");
            projectImage.classList.remove("hidden");
          });
        };

        attachButtonEvents();
      });

      function toggleMenu() {
        const sideMenu = document.getElementById("side-menu");
        const menuButton = document.querySelector(".openbtn");
        if (sideMenu.classList.contains("hidden")) {
          sideMenu.classList.remove("hidden");
          sideMenu.classList.add("visible");
          menuButton.textContent = "✖";
        } else {
          sideMenu.classList.remove("visible");
          sideMenu.classList.add("hidden");
          menuButton.textContent = "☰";
        }
      }

      function closeMenu() {
        const sideMenu = document.getElementById("side-menu");
        const menuButton = document.querySelector(".openbtn");
        if (!sideMenu.classList.contains("hidden")) {
          sideMenu.classList.remove("visible");
          sideMenu.classList.add("hidden");
          menuButton.textContent = "☰";
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        const menuLinks = document.querySelectorAll(".side-menu a");
        menuLinks.forEach((link) => {
          link.addEventListener("click", closeMenu);
        });

        document.addEventListener("click", (event) => {
          const sideMenu = document.getElementById("side-menu");
          const menuButton = document.querySelector(".openbtn");
          if (
            !sideMenu.contains(event.target) &&
            !menuButton.contains(event.target) &&
            !sideMenu.classList.contains("hidden")
          ) {
            closeMenu();
          }
        });
      });
    </script>
  </body>
</html>
