<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela de Login</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      .hide {
        display: none;
      }
      .visible {
        display: block;
      }
      .side-menu.hidden {
        display: none;
      }
      .side-menu.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="caixa-principal" id="home">
      <div class="side-menu hidden" id="side-menu">
        <a href="../../manual/index.html">HOME</a>
        <a href="#sobre">TUTORIAL</a>

        <a href="#clinica">DESLOGAR</a>
        <div class="button-container">
          <button class="btn ligar">Ligar IA</button>
          <button class="btn desligar">Desligar IA</button>
        </div>
      </div>
      <span class="openbtn" onclick="toggleMenu()">☰</span>
      <nav>
        <ul>
          <li><a class="link-menu" href="../../manual/index.html">HOME</a></li>
          <li><a class="link-menu" href="#sobre">TUTORIAL</a></li>
          <li>
            <a class="link-menu" href="../../manual/index.html">CONTATO</a>
          </li>
          <li><a class="link-menu" href="#fale-comigo">DESLOGAR</a></li>
          <li>
            <button class="btn ligar">Ligar IA</button>
            <button class="btn desligar">Desligar IA</button>
          </li>
        </ul>
      </nav>
      <div class="imagens-container-wrapper">
        <div class="imagens-container" id="content-area">
          <div class="manual-container">
            <img
              id="project-image"
              src="../../../image/telinhas/sto.png"
              alt="Projeto Bac Bo"
            />
            <div class="video-container hide" id="video-container"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const token =
          localStorage.getItem("authToken") || "Token não encontrado";
        const videoContainer = document.getElementById("video-container");
        const projectImage = document.getElementById("project-image");

        if (!token) {
          console.log("Nenhum token encontrado no localStorage.");
          window.location.href = "../../../../index.html";
          return;
        }

        const loadVideo = async () => {
          closeMenu();
          if (token) {
            try {
              const response = await fetch(
                `https://automa-cassinos.dev.br/stoke?token=${encodeURIComponent(
                  token
                )}`,
                { method: "GET" }
              );
              const data = await response.json();
              if (data.videoUrl) {
                console.log(data.videoUrl);
                videoContainer.innerHTML = `<iframe src="${data.videoUrl}" frameborder="0" allowfullscreen></iframe>`;
                videoContainer.classList.remove("hide");
                projectImage.classList.add("hide");
                updateButtonStates("IA Ligada", "Desligar IA");
              } else {
                alert("Erro ao obter o link de vídeo.");
              }
            } catch (error) {
              console.error("Erro ao fazer a solicitação:", error);
            }
          } else {
            alert("Token não encontrado. Por favor, faça o login novamente.");
          }
        };

        const closeVideo = () => {
          videoContainer.innerHTML = "";
          videoContainer.classList.add("hide");
          projectImage.classList.remove("hide");
          updateButtonStates("Ligar IA", "IA Desligada");
        };

        const updateButtonStates = (ligarText, desligarText) => {
          const ligarButton = document.querySelector(".btn.ligar");
          const desligarButton = document.querySelector(".btn.desligar");
          ligarButton.textContent = ligarText;
          desligarButton.textContent = desligarText;
        };

        const attachButtonEvents = () => {
          const ligarButtons = document.querySelectorAll(".btn.ligar");
          const desligarButtons = document.querySelectorAll(".btn.desligar");

          ligarButtons.forEach((button) => {
            button.addEventListener("click", loadVideo);
          });

          desligarButtons.forEach((button) => {
            button.addEventListener("click", () => {
              closeVideo();
              closeMenu();
            });
          });
        };

        attachButtonEvents();
      });

      function toggleMenu() {
        const sideMenu = document.getElementById("side-menu");
        const menuButton = document.querySelector(".openbtn");
        if (sideMenu.classList.contains("hidden")) {
          sideMenu.classList.remove("hidden");
          sideMenu.classList.add("visible");
          menuButton.textContent = "☰";
        } else {
          sideMenu.classList.remove("visible");
          sideMenu.classList.add("hidden");
          menuButton.textContent = "☰";
        }
      }

      function closeMenu() {
        const sideMenu = document.getElementById("side-menu");
        const menuButton = document.querySelector(".openbtn");
        if (!sideMenu.classList.contains("hidden")) {
          sideMenu.classList.remove("visible");
          sideMenu.classList.add("hidden");
          menuButton.textContent = "☰";
        }
      }
    </script>
  </body>
</html>
